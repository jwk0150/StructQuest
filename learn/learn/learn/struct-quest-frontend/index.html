<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StructQuest — AI-Powered Learning</title>

    <!-- Google Fonts: Space Grotesk (display) + DM Sans (body) + JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    >
  </head>
  <body>
    <div id="app"></div>
    <!-- Live2D Cubism 2 Runtime（数字人模型必需，多个备选 CDN） -->
    <!-- 主源 -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script>
      // 备用：如果主源失败，尝试其他源
      window.addEventListener('error', function(e) {
        if (e.target && e.target.tagName === 'SCRIPT' && e.target.src.includes('live2d')) {
          var s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.10.0/dist/live2dcubismcore.min.js';
          document.head.appendChild(s);
        }
      }, true);
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
