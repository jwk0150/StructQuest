<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字人系统 - 小智</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app">
        <!-- 左侧：数字人形象区 -->
        <div class="avatar-panel" id="avatarPanel">
            <div class="avatar-stage">
                <canvas id="avatarCanvas" width="600" height="600"></canvas>
                <!-- 状态指示器 -->
                <div class="status-badge" id="statusBadge">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">待命中</span>
                </div>
                <!-- 音频波形可视化 -->
                <div class="waveform" id="waveform"></div>
            </div>

            <!-- 控制面板 -->
            <div class="controls">
                <div class="voice-selector">
                    <label>音色选择</label>
                    <select id="voiceSelect">
                        <option value="xiaoxiao">晓晓 - 温柔女声</option>
                        <option value="yunxi">云希 - 阳光男声</option>
                        <option value="xiaoyi">晓伊 - 知性女声</option>
                        <option value="yunyang">云扬 - 沉稳男声</option>
                        <option value="xiaobei">晓贝 - 活泼女声</option>
                        <option value="yunjian">云健 - 浑厚男声</option>
                    </select>
                </div>
                <div class="toggle-group">
                    <button class="toggle-btn active" id="ttsToggle" title="语音播报">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
                    </button>
                    <button class="toggle-btn" id="micToggle" title="语音输入">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 右侧：对话区 -->
        <div class="chat-panel">
            <div class="chat-header">
                <div class="chat-title">
                    <h2>与小智对话</h2>
                    <span class="subtitle">AI 数字人 · 实时语音交互</span>
                </div>
                <button class="clear-btn" id="clearBtn" title="清空对话">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                </button>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message ai">
                    <div class="message-avatar">智</div>
                    <div class="message-content">
                        <p>你好！我是小智，你的AI数字人助手。有什么想聊的尽管说，我会用语音回答你~</p>
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="chatInput" placeholder="输入消息，或点击麦克风语音对话..." autocomplete="off">
                    <button class="send-btn" id="sendBtn">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    </button>
                </div>
                <div class="input-hint">按 Enter 发送 · 数字人会自动语音回答</div>
            </div>
        </div>
    </div>

    <script src="/static/avatar.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
